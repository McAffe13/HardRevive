# HardRevive - Sounds Configuration
# Sound names: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html

sounds:
  # Sound played when a player is revived (played to the revived player)
  revive-success:
    enabled: true
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0

  # Sound played to the player performing the revival
  revive-performed:
    enabled: true
    sound: ITEM_TOTEM_USE
    volume: 1.0
    pitch: 1.0

  # Sound played when GUI is opened
  gui-open:
    enabled: true
    sound: BLOCK_CHEST_OPEN
    volume: 0.5
    pitch: 1.2

  # Sound played when clicking a dead player entry
  gui-click:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.0

  # Sound played on confirmation
  gui-confirm:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0
    pitch: 1.5

  # Sound played on cancel
  gui-cancel:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 0.8

  # Sound played when a player dies
  player-death:
    enabled: true
    sound: ENTITY_WITHER_SPAWN
    volume: 0.7
    pitch: 1.2
