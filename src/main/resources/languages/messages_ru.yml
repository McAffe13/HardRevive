# HardRevive - Русские сообщения
# Поддерживает формат MiniMessage: https://docs.advntr.dev/minimessage/format.html

prefix: "<dark_gray>[<gradient:dark_red:gold>HardRevive</gradient>]</dark_gray> "

# Общие сообщения
no-permission: "<prefix><red>У вас нет прав для этого действия."
player-not-found: "<prefix><red>Игрок <yellow><player></yellow> не найден."
player-not-dead: "<prefix><red>Игрок <yellow><player></yellow> не мёртв."
invalid-amount: "<prefix><red>Пожалуйста, введите корректное количество (1 или больше)."
usage-give: "<prefix><yellow>Использование: <white>/revive give <player> [количество]"
console-only: "<prefix><red>Это действие может выполняться только из консоли."

# Сообщения о смерти
player-died: "<prefix><yellow><player></yellow> <gray>погиб. <dark_gray>(<cause>)"
player-banned: "<prefix><dark_red><player></dark_red> <gray>заблокирован до воскрешения."

# Сообщение бана при попытке входа мёртвого игрока
ban-message: |
  <dark_red><bold>Вы мертвы.</bold></dark_red>
  <gray>Вы были убиты <yellow><death_date></yellow>.
  <gray>Причина: <yellow><cause></yellow>
  <gray>Вас должны воскресить, чтобы вы снова смогли зайти на сервер.

# Сообщения о воскрешении
player-revived: "<prefix><green><reviver></green> <gray>воскресил <yellow><player></yellow>!"
revive-broadcast: "<prefix><aqua><player></aqua> <gray>был возвращён к жизни игроком <green><reviver></green>!"
revive-item-consumed: "<prefix><gray>Тотем воскрешения использован."
not-enough-revival-items: "<prefix><red>В вашем инвентаре нет Тотемов Воскрешения."

# Команда give
give-success: "<prefix><gray>Вы дали <aqua><player></aqua> <yellow><amount></yellow> <gold>Тотем(ов) Воскрешения</gold>."
give-received: "<prefix><gray>Вы получили <yellow><amount></yellow> <gold>Тотем(ов) Воскрешения</gold>."

# Команда list
list-header: "<prefix><gray>Мёртвые игроки <dark_gray>(<yellow><count></yellow><dark_gray>):"
list-entry: "  <dark_gray>• <yellow><player></yellow> <dark_gray>- <gray>погиб <white><time_ago></white> назад"
list-empty: "<prefix><gray>В данный момент нет мёртвых игроков."

# Команда info
info-header: "<prefix><gray>Информация об игроке <yellow><player></yellow>:"
info-death-date: "  <dark_gray>• <gray>Погиб: <white><death_date>"
info-cause: "  <dark_gray>• <gray>Причина: <white><cause>"
info-time-ago: "  <dark_gray>• <gray>Время с момента смерти: <white><time_ago>"
info-revive-count: "  <dark_gray>• <gray>Всего воскрешений: <white><count>"

# Команда reload
reload-success: "<prefix><green>Конфигурация успешно перезагружена."
reload-failed: "<prefix><red>Произошла ошибка при перезагрузке конфигурации."

# Команда help
help-header: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
help-title: "  <gradient:dark_red:gold><bold>HardRevive</bold></gradient> <gray>v<version>"
help-footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
help-reload: "  <gold>/revive reload <dark_gray>— <gray>Перезагрузить плагин"
help-give: "  <gold>/revive give <player> [количество] <dark_gray>— <gray>Выдать предметы воскрешения"
help-list: "  <gold>/revive list <dark_gray>— <gray>Список мёртвых игроков"
help-info: "  <gold>/revive info <player> <dark_gray>— <gray>Информация о смерти игрока"
help-help: "  <gold>/revive help <dark_gray>— <gray>Показать это меню помощи"

# Сообщения GUI
gui-search-placeholder: "Введите имя игрока..."
gui-search-title: "Поиск игрока"
gui-no-results: "<red>Результаты не найдены."

# Проверка обновлений
update-available: "<prefix><yellow>Доступна новая версия HardRevive: <green><latest></green> <dark_gray>(текущая: <gray><current></gray><dark_gray>)"
update-url: "<prefix><gray>Скачать: <aqua><underlined>https://modrinth.com/plugin/hardrevive"
no-update: "<prefix><green>HardRevive актуален <dark_gray>(<gray>v<version></gray><dark_gray>)."
update-check-failed: "<prefix><yellow>Не удалось проверить обновления."
